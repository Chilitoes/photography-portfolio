name: Migrate DreamHost Content (One-Time Setup)

on:
  workflow_dispatch

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Migrate existing content to /personal/
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << 'EOF'
          cd /home/alstonsjg/public_html

          # Check current files
          echo "Current files in public_html:"
          ls -la

          # Create personal directory if it doesn't exist
          mkdir -p personal

          # Move all files and folders to personal, except .htaccess and personal folder itself
          echo "Moving files to personal/ directory..."
          for item in *; do
            if [[ "$item" != "personal" && "$item" != ".htaccess" ]]; then
              mv "$item" "personal/$item" 2>/dev/null || true
            fi
          done

          echo "Migration complete!"
          echo "Final structure:"
          ls -la
          echo ""
          echo "Personal folder contents:"
          ls -la personal/
          EOF
